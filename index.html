<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Directory</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  
  <style>
    :root { --bg-primary: #fafafa; --text-primary: #1a1a1a; --text-secondary: #6b6b6b; --accent: #2563eb; --border: #e5e5e5; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg-primary); color: var(--text-primary); font-family: -apple-system, sans-serif; }
    
    .header { background: white; border-bottom: 1px solid var(--border); padding: 2rem 0; }
    .header-content { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem; }
    .header h1 { font-size: 1.75rem; font-weight: 700; }
    
    .controls { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
    .search-input { width: 100%; padding: 0.875rem 1rem 0.875rem 3rem; border: 1px solid var(--border); border-radius: 12px; font-size: 0.95rem; background: white; position: relative; }
    .search-wrapper { position: relative; margin-bottom: 1.5rem; }
    .search-icon { position: absolute; left: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-secondary); }
    
    .action-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .btn-add { background: var(--text-primary); color: white; border: none; padding: 0.625rem 1.25rem; border-radius: 8px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; }
    .btn-add:hover { background: #000; }
    
    .container-main { max-width: 1200px; margin: 0 auto; padding: 0 1.5rem 3rem; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
    
    .card { background: white; border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; transition: all 0.2s; }
    .card:hover { box-shadow: 0 12px 32px rgba(0,0,0,0.08); transform: translateY(-2px); }
    
    .card-header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.75rem; }
    .card-title-wrapper { display: flex; align-items: center; gap: 0.75rem; flex: 1; min-width: 0; }
    .site-thumbnail { width: 36px; height: 36px; border-radius: 8px; object-fit: cover; background: #f0f0f0; border: 1px solid var(--border); }
    .card-title { font-size: 1.05rem; font-weight: 600; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .card-actions { display: flex; gap: 0.25rem; }
    .btn-icon { background: transparent; border: none; padding: 0.375rem; border-radius: 6px; cursor: pointer; color: var(--text-secondary); }
    .btn-icon:hover { background: #f0f0f0; }
    .btn-icon.delete:hover { background: #fee2e2; color: #dc2626; }
    
    .card-url { display: block; color: var(--accent); text-decoration: none; font-size: 0.85rem; margin-bottom: 0.75rem; word-break: break-all; }
    .card-description { color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 1rem; }
    .card-footer-row { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--border); }
    .badge { background: #f0f0f0; color: var(--text-secondary); padding: 0.25rem 0.75rem; border-radius: 6px; font-size: 0.8rem; }
    .btn-visit { background: transparent; border: 1px solid var(--border); color: var(--text-primary); padding: 0.375rem 0.875rem; border-radius: 6px; text-decoration: none; font-size: 0.85rem; }
    .btn-visit:hover { background: var(--text-primary); color: white; }
    
    .toast { position: fixed; bottom: 2rem; right: 2rem; color: white; padding: 1rem 1.5rem; border-radius: 8px; display: none; z-index: 9999999; }
    .toast.active { display: block; }
    .toast.success { background: #10b981; }
    .toast.error { background: #ef4444; }
    
    .empty-state { display: none; text-align: center; padding: 4rem 1rem; color: var(--text-secondary); }
    .empty-state.active { display: block; }
  </style>
</head>
<body>

  <header class="header">
    <div class="header-content">
      <h1>Link Directory</h1>
      <p style="color: var(--text-secondary);">Manage and organize your curated links</p>
    </div>
  </header>

  <div class="controls">
    <div class="search-wrapper">
      <i class="bi bi-search search-icon"></i>
      <input type="text" id="searchInput" class="search-input" placeholder="Search links...">
    </div>
    <div class="action-bar">
      <div class="stats">Showing <strong id="resultCount">0</strong> links</div>
      <button class="btn-add" id="addBtn"><i class="bi bi-plus-lg"></i> Add Link</button>
    </div>
  </div>

  <div class="container-main">
    <div id="linksGrid" class="grid"></div>
    <div id="emptyState" class="empty-state">
      <i class="bi bi-inbox" style="font-size: 3rem; opacity: 0.3;"></i>
      <h3>No links yet</h3>
      <p>Add your first link to get started</p>
    </div>
  </div>

  <!-- Modal -->
  <div id="modalOverlay" style="display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999999; align-items: center; justify-content: center; padding: 1rem;">
    <div style="background: white; border-radius: 16px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3);">
      <div style="padding: 1.5rem; border-bottom: 1px solid #e5e5e5; display: flex; justify-content: space-between; align-items: center;">
        <h3 id="modalTitle" style="font-size: 1.25rem; font-weight: 600; margin: 0;">Add Link</h3>
        <button id="modalClose" style="background: transparent; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
      </div>
      <div style="padding: 1.5rem;">
        <input type="hidden" id="linkId">
        <div style="margin-bottom: 1.25rem;">
          <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem;">Title *</label>
          <input type="text" id="title" style="width: 100%; padding: 0.75rem; border: 1px solid #e5e5e5; border-radius: 8px;" required>
        </div>
        <div style="margin-bottom: 1.25rem;">
          <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem;">URL *</label>
          <input type="url" id="url" style="width: 100%; padding: 0.75rem; border: 1px solid #e5e5e5; border-radius: 8px;" required>
        </div>
        <div style="margin-bottom: 1.25rem;">
          <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem;">Description</label>
          <textarea id="description" style="width: 100%; padding: 0.75rem; border: 1px solid #e5e5e5; border-radius: 8px; min-height: 80px;"></textarea>
        </div>
        <div style="margin-bottom: 1.25rem;">
          <label style="display: block; font-size: 0.9rem; font-weight: 500; margin-bottom: 0.5rem;">Category</label>
          <input type="text" id="category" style="width: 100%; padding: 0.75rem; border: 1px solid #e5e5e5; border-radius: 8px;">
        </div>
      </div>
      <div style="padding: 1.5rem; border-top: 1px solid #e5e5e5; display: flex; gap: 0.75rem; justify-content: flex-end;">
        <button id="cancelBtn" style="padding: 0.625rem 1.25rem; border-radius: 8px; border: 1px solid #e5e5e5; background: #fafafa; cursor: pointer;">Cancel</button>
        <button id="saveBtn" style="padding: 0.625rem 1.25rem; border-radius: 8px; border: none; background: #1a1a1a; color: white; cursor: pointer;">Save</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    // ️ PASTE YOUR WEB APP URL HERE
    const API_URL = 'https://script.google.com/macros/s/AKfycbwJqpLJMiAvqssQ-Dqj71o5Pd1U45lNWiesswQYLrFEv3hiwNlrrbcTHXSSMLWh7wo/exec';
    
    let allLinks = [];
    let editingId = null;

    // DOM Elements
    const modalOverlay = document.getElementById('modalOverlay');
    const modalTitle = document.getElementById('modalTitle');
    const linksGrid = document.getElementById('linksGrid');
    const searchInput = document.getElementById('searchInput');
    const resultCount = document.getElementById('resultCount');
    const emptyState = document.getElementById('emptyState');
    const toast = document.getElementById('toast');

    // Init
    document.addEventListener('DOMContentLoaded', () => {
      fetchLinks();
      
      document.getElementById('addBtn').addEventListener('click', () => openModal());
      document.getElementById('modalClose').addEventListener('click', closeModal);
      document.getElementById('cancelBtn').addEventListener('click', closeModal);
      document.getElementById('saveBtn').addEventListener('click', saveLink);
      
      modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
      searchInput.addEventListener('input', debounce(filterLinks, 300));
      
      // Event Delegation for Edit/Delete
      linksGrid.addEventListener('click', (e) => {
        const editBtn = e.target.closest('[data-action="edit"]');
        const deleteBtn = e.target.closest('[data-action="delete"]');
        
        if (editBtn) {
          const id = parseInt(editBtn.dataset.id);
          const link = allLinks.find(l => l.id === id);
          if (link) openModal(link);
        }
        if (deleteBtn) {
          const id = parseInt(deleteBtn.dataset.id);
          deleteLink(id);
        }
      });
    });

    // Modal Logic
    function openModal(link = null) {
      editingId = link ? link.id : null;
      modalTitle.textContent = link ? 'Edit Link' : 'Add Link';
      
      document.getElementById('linkId').value = link ? link.id : '';
      document.getElementById('title').value = link ? link.title : '';
      document.getElementById('url').value = link ? link.url : '';
      document.getElementById('description').value = link ? link.description : '';
      document.getElementById('category').value = link ? link.category : '';
      
      modalOverlay.style.display = 'flex';
      setTimeout(() => document.getElementById('title').focus(), 100);
    }

    function closeModal() {
      modalOverlay.style.display = 'none';
      editingId = null;
    }

    // Data Logic
    async function fetchLinks() {
      try {
        const response = await fetch(`${API_URL}?t=${Date.now()}`);
        const result = await response.json();
        if (result.success) {
          allLinks = result.data || [];
          filterLinks();
        }
      } catch (error) {
        showToast('Error loading links', 'error');
      }
    }

    function filterLinks() {
      const term = searchInput.value.toLowerCase().trim();
      const filtered = allLinks.filter(link => {
        if (!term) return true;
        return (link.title && link.title.toLowerCase().includes(term)) ||
               (link.url && link.url.toLowerCase().includes(term)) ||
               (link.category && link.category.toLowerCase().includes(term));
      });
      renderLinks(filtered);
    }

    function renderLinks(links) {
      resultCount.textContent = links.length;
      if (links.length === 0) {
        linksGrid.innerHTML = '';
        emptyState.classList.add('active');
        return;
      }
      emptyState.classList.remove('active');
      
      linksGrid.innerHTML = links.map(link => {
        const domain = new URL(link.url).hostname;
        const thumb = `https://www.google.com/s2/favicons?domain=${domain}&sz=128`;
        
        return `
        <div class="card">
          <div class="card-header-row">
            <div class="card-title-wrapper">
              <img src="${thumb}" class="site-thumbnail" onerror="this.src='https://via.placeholder.com/36?text=🔗'">
              <h3 class="card-title">${escapeHtml(link.title)}</h3>
            </div>
            <div class="card-actions">
              <button class="btn-icon" data-action="edit" data-id="${link.id}"><i class="bi bi-pencil"></i></button>
              <button class="btn-icon delete" data-action="delete" data-id="${link.id}"><i class="bi bi-trash"></i></button>
            </div>
          </div>
          <a href="${escapeHtml(link.url)}" target="_blank" class="card-url">${escapeHtml(link.url)}</a>
          <p class="card-description">${escapeHtml(link.description || '')}</p>
          <div class="card-footer-row">
            ${link.category ? `<span class="badge">${escapeHtml(link.category)}</span>` : '<span></span>'}
            <a href="${escapeHtml(link.url)}" target="_blank" class="btn-visit">Visit <i class="bi bi-arrow-up-right"></i></a>
          </div>
        </div>`;
      }).join('');
    }

    // CRUD Operations
    async function saveLink() {
      const title = document.getElementById('title').value.trim();
      const url = document.getElementById('url').value.trim();
      const description = document.getElementById('description').value.trim();
      const category = document.getElementById('category').value.trim();

      if (!title || !url) { showToast('Title and URL required', 'error'); return; }

      // Determine action
      const action = editingId ? 'update' : 'add';
      
      // Create payload with action INSIDE the body
      const payload = {
        action: action,
        title: title,
        url: url,
        description: description,
        category: category
      };
      
      if (editingId) payload.id = editingId;

      // Optimistic UI Update (Update screen immediately)
      if (action === 'add') {
        // We don't know the ID yet, so we just refresh after
      } else {
        // Update local array immediately
        const index = allLinks.findIndex(l => l.id === editingId);
        if (index !== -1) {
          allLinks[index] = { ...allLinks[index], title, url, description, category };
          filterLinks();
        }
      }

      closeModal();
      showToast(action === 'add' ? 'Adding...' : 'Saving...', 'success');

      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });
        
        showToast(editingId ? 'Updated successfully!' : 'Added successfully!', 'success');
        setTimeout(fetchLinks, 1000); // Refresh to get correct IDs
      } catch (error) {
        showToast('Error saving', 'error');
        fetchLinks(); // Revert on error
      }
    }

    async function deleteLink(id) {
      if (!confirm('Are you sure you want to delete this link?')) return;

      // Optimistic UI Update (Remove from screen immediately)
      allLinks = allLinks.filter(l => l.id !== id);
      filterLinks();
      showToast('Deleting...', 'success');

      try {
        await fetch(API_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({ action: 'delete', id: id })
        });
        showToast('Deleted successfully!', 'success');
      } catch (error) {
        showToast('Error deleting', 'error');
        fetchLinks(); // Revert on error
      }
    }

    // Utilities
    function showToast(msg, type) {
      toast.textContent = msg;
      toast.className = `toast active ${type}`;
      setTimeout(() => toast.classList.remove('active'), 3000);
    }

    function debounce(fn, wait) {
      let t; return (...args) => { clearTimeout(t); t = setTimeout(() => fn(...args), wait); };
    }

    function escapeHtml(text) {
      if (!text) return '';
      return String(text).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
    }
  </script>
</body>
</html>
