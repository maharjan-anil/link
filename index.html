<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Link Directory</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
<style>
:root {
  --bg-primary: #f8fafc;
  --bg-card: #ffffff;
  --text-primary: #0f172a;
  --text-secondary: #64748b;
  --text-muted: #94a3b8;
  --accent: #3b82f6;
  --accent-dark: #2563eb;
  --border: #e2e8f0;
  --shadow: 0 1px 3px rgba(0,0,0,0.04);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.06);
}
* { box-sizing: border-box; }
body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  min-height: 100vh;
  margin: 0;
}
.header {
  background: linear-gradient(135deg, #3b82f6, #2563eb);
  color: white;
  padding: 3rem 1rem 5rem;
  text-align: center;
}
.header h1 {
  font-weight: 800;
  font-size: 2rem;
  margin-bottom: 0.5rem;
  letter-spacing: -0.02em;
}
.header p {
  opacity: 0.9;
  font-size: 1rem;
  margin: 0;
}
.main-container {
  max-width: 900px;
  margin: -3rem auto 2rem;
  padding: 0 1rem;
  position: relative;
  z-index: 10;
}
.search-card {
  background: var(--bg-card);
  border-radius: 20px;
  padding: 1.5rem;
  box-shadow: var(--shadow-md);
  margin-bottom: 1.5rem;
}
.search-wrapper {
  display: flex;
  align-items: center;
  background: var(--bg-primary);
  border: 2px solid var(--border);
  border-radius: 12px;
  padding: 0.5rem 1rem;
  transition: all 0.2s;
}
.search-wrapper:focus-within {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
}
.search-wrapper i {
  color: var(--text-muted);
  font-size: 1.2rem;
  margin-right: 0.75rem;
}
.search-wrapper input {
  border: none;
  outline: none;
  background: transparent;
  flex: 1;
  font-size: 1rem;
  color: var(--text-primary);
  padding: 0.5rem 0;
}
.search-wrapper input::placeholder {
  color: var(--text-muted);
}
.search-actions {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 1rem;
  padding-top: 1rem;
  border-top: 1px solid var(--border);
}
.stats {
  color: var(--text-secondary);
  font-size: 0.9rem;
}
.stats strong {
  color: var(--accent);
  font-weight: 700;
}
.btn-add {
  background: var(--text-primary);
  color: white;
  border: none;
  padding: 0.625rem 1.25rem;
  border-radius: 10px;
  font-size: 0.9rem;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 0.5rem;
  transition: all 0.2s;
}
.btn-add:hover {
  background: #000;
  transform: translateY(-1px);
}
.link-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.25rem;
  margin-bottom: 0.75rem;
  box-shadow: var(--shadow);
  transition: all 0.2s;
}
.link-card:hover {
  box-shadow: var(--shadow-md);
  transform: translateY(-2px);
}
.link-header {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  margin-bottom: 0.5rem;
  gap: 0.75rem;
}
.link-title-wrapper {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  flex: 1;
  min-width: 0;
}
.site-thumbnail {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  object-fit: cover;
  background: var(--bg-primary);
  flex-shrink: 0;
  border: 1px solid var(--border);
}
.link-title {
  font-size: 1rem;
  font-weight: 600;
  margin: 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: var(--text-primary);
}
.link-actions {
  display: flex;
  gap: 0.25rem;
  flex-shrink: 0;
}
.btn-icon {
  background: transparent;
  border: none;
  padding: 0.4rem;
  border-radius: 8px;
  cursor: pointer;
  color: var(--text-muted);
  transition: all 0.15s;
}
.btn-icon:hover {
  background: var(--bg-primary);
  color: var(--text-primary);
}
.btn-icon.delete:hover {
  background: #fee2e2;
  color: #dc2626;
}
.link-url {
  display: block;
  color: var(--accent);
  text-decoration: none;
  font-size: 0.85rem;
  margin-bottom: 0.5rem;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.link-url:hover {
  text-decoration: underline;
}
.link-desc {
  color: var(--text-secondary);
  font-size: 0.875rem;
  margin-bottom: 0.75rem;
  line-height: 1.5;
}
.link-footer {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding-top: 0.75rem;
  border-top: 1px solid var(--border);
}
.badge {
  background: var(--bg-primary);
  color: var(--text-secondary);
  padding: 0.25rem 0.75rem;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 500;
}
.btn-visit {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text-primary);
  padding: 0.375rem 0.875rem;
  border-radius: 8px;
  font-size: 0.85rem;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 0.375rem;
  font-weight: 500;
  transition: all 0.2s;
}
.btn-visit:hover {
  background: var(--text-primary);
  color: white;
  border-color: var(--text-primary);
}
.state-message {
  text-align: center;
  padding: 4rem 1.5rem;
  background: var(--bg-card);
  border-radius: 20px;
  box-shadow: var(--shadow);
}
.state-message i {
  font-size: 3.5rem;
  color: var(--text-muted);
  margin-bottom: 1rem;
  display: block;
  opacity: 0.5;
}
.state-message h3 {
  font-weight: 700;
  margin-bottom: 0.5rem;
  color: var(--text-primary);
}
.state-message p {
  color: var(--text-secondary);
  margin: 0;
}
.loader {
  text-align: center;
  padding: 3rem;
  display: none;
}
.loader.active { display: block; }
.spinner {
  width: 40px;
  height: 40px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 1rem;
}
@keyframes spin { to { transform: rotate(360deg); } }
.toast-container {
  position: fixed;
  bottom: 2rem;
  right: 2rem;
  z-index: 9999;
}
.custom-toast {
  background: var(--text-primary);
  color: white;
  padding: 0.875rem 1.25rem;
  border-radius: 10px;
  margin-top: 0.5rem;
  box-shadow: var(--shadow-md);
  display: none;
  font-size: 0.9rem;
  font-weight: 500;
  min-width: 250px;
}
.custom-toast.active { display: block; animation: slideIn 0.3s; }
.custom-toast.success { background: #10b981; }
.custom-toast.error { background: #ef4444; }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}
body.modal-open { overflow: hidden; }
.modal-custom {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(4px);
  z-index: 9999;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-custom.active { display: flex; }
.modal-box {
  background: white;
  border-radius: 20px;
  width: 100%;
  max-width: 480px;
  max-height: 90vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
  animation: modalIn 0.25s;
}
@keyframes modalIn {
  from { transform: scale(0.95); opacity: 0; }
  to { transform: scale(1); opacity: 1; }
}
.modal-head {
  padding: 1.5rem;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.modal-head h3 {
  margin: 0;
  font-size: 1.25rem;
  font-weight: 700;
}
.modal-close-btn {
  background: var(--bg-primary);
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  color: var(--text-secondary);
}
.modal-body-custom { padding: 1.5rem; }
.form-label-custom {
  display: block;
  font-size: 0.875rem;
  font-weight: 600;
  margin-bottom: 0.5rem;
  color: var(--text-primary);
}
.form-input-custom {
  width: 100%;
  padding: 0.75rem 1rem;
  border: 1.5px solid var(--border);
  border-radius: 10px;
  font-size: 0.95rem;
  font-family: inherit;
  background: var(--bg-card);
  transition: border-color 0.2s;
  margin-bottom: 1rem;
}
.form-input-custom:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
}
.modal-foot {
  padding: 1.25rem 1.5rem;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 0.75rem;
  justify-content: flex-end;
}
.btn-cancel {
  background: var(--bg-primary);
  color: var(--text-primary);
  border: 1px solid var(--border);
  padding: 0.625rem 1.25rem;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
}
.btn-save {
  background: var(--accent);
  color: white;
  border: none;
  padding: 0.625rem 1.25rem;
  border-radius: 10px;
  font-weight: 600;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.2s;
}
.btn-save:hover:not(:disabled) { background: var(--accent-dark); }
.btn-save:disabled { opacity: 0.6; cursor: not-allowed; }
</style>
</head>
<body>

<header class="header">
  <h1><i class="bi bi-link-45deg me-2"></i>Link Directory</h1>
  <p>Search and manage your curated links</p>
</header>

<div class="main-container">
  <div class="search-card">
    <div class="search-wrapper">
      <i class="bi bi-search"></i>
      <input type="text" id="searchInput" placeholder="Search links by title, URL, or category..." autocomplete="off">
    </div>
    <div class="search-actions">
      <div class="stats">Showing <strong id="resultCount">0</strong> links</div>
      <button class="btn-add" id="addBtn">
        <i class="bi bi-plus-lg"></i> Add Link
      </button>
    </div>
  </div>

  <div id="loader" class="loader">
    <div class="spinner"></div>
    <p>Loading links...</p>
  </div>

  <div id="contentArea"></div>
</div>

<!-- Modal -->
<div class="modal-custom" id="modal">
  <div class="modal-box">
    <div class="modal-head">
      <h3 id="modalTitle">Add Link</h3>
      <button class="modal-close-btn" id="modalCloseBtn"><i class="bi bi-x-lg"></i></button>
    </div>
    <div class="modal-body-custom">
      <input type="hidden" id="linkId">
      <label class="form-label-custom">Title *</label>
      <input type="text" id="title" class="form-input-custom" placeholder="e.g., Google" required>
      
      <label class="form-label-custom">URL *</label>
      <input type="url" id="url" class="form-input-custom" placeholder="https://example.com" required>
      
      <label class="form-label-custom">Description</label>
      <textarea id="description" class="form-input-custom" rows="3" placeholder="Brief description..."></textarea>
      
      <label class="form-label-custom">Category</label>
      <input type="text" id="category" class="form-input-custom" placeholder="e.g., Work, Social, News">
    </div>
    <div class="modal-foot">
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-save" id="saveBtn">Save</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// ⚠️ REPLACE WITH YOUR GOOGLE APPS SCRIPT WEB APP URL
const API_URL = 'https://script.google.com/macros/s/AKfycbyLv0VT5o2ORuS_zXFIqN5m8egOAyNcKUg1QSfgasIk9oPQZKHDcv_UysPpDvZd3i0MBw/exec';

let allLinks = [];
let editingId = null;

const searchInput = document.getElementById('searchInput');
const resultCount = document.getElementById('resultCount');
const contentArea = document.getElementById('contentArea');
const loader = document.getElementById('loader');
const modal = document.getElementById('modal');
const modalTitle = document.getElementById('modalTitle');
const saveBtn = document.getElementById('saveBtn');

// ============ INITIALIZATION ============
document.addEventListener('DOMContentLoaded', () => {
  fetchLinks();
  setupEvents();
});

function setupEvents() {
  document.getElementById('addBtn').addEventListener('click', () => openModal());
  document.getElementById('modalCloseBtn').addEventListener('click', closeModal);
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  saveBtn.addEventListener('click', saveLink);
  modal.addEventListener('click', (e) => {
    if (e.target === modal) closeModal();
  });
  searchInput.addEventListener('input', debounce(filterLinks, 300));
  
  // Event delegation for edit/delete
  contentArea.addEventListener('click', (e) => {
    const editBtn = e.target.closest('[data-action="edit"]');
    const deleteBtn = e.target.closest('[data-action="delete"]');
    if (editBtn) editLink(parseInt(editBtn.dataset.id));
    if (deleteBtn) deleteLink(parseInt(deleteBtn.dataset.id));
  });
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.classList.contains('active')) closeModal();
  });
}

// ============ MODAL LOGIC ============
function openModal(link = null) {
  editingId = link ? link.id : null;
  modalTitle.textContent = link ? 'Edit Link' : 'Add Link';
  document.getElementById('linkId').value = link ? link.id : '';
  document.getElementById('title').value = link ? link.title : '';
  document.getElementById('url').value = link ? link.url : '';
  document.getElementById('description').value = link ? link.description : '';
  document.getElementById('category').value = link ? link.category : '';
  modal.classList.add('active');
  document.body.classList.add('modal-open');
  setTimeout(() => document.getElementById('title').focus(), 100);
}

function closeModal() {
  modal.classList.remove('active');
  document.body.classList.remove('modal-open');
  editingId = null;
}

// ============ DATA OPERATIONS ============
async function fetchLinks() {
  loader.classList.add('active');
  contentArea.innerHTML = '';
  try {
    const response = await fetch(`${API_URL}?t=${Date.now()}`);
    const result = await response.json();
    if (!result.success) throw new Error(result.error);
    allLinks = result.data || [];
    renderContent();
  } catch (error) {
    console.error('Fetch error:', error);
    showToast('Failed to load links: ' + error.message, 'error');
    showWelcome();
  } finally {
    loader.classList.remove('active');
  }
}

function filterLinks() {
  renderContent();
}

function renderContent() {
  const term = searchInput.value.toLowerCase().trim();
  
  if (!term) {
    showWelcome();
    return;
  }
  
  const filtered = allLinks.filter(link => {
    return (link.title && link.title.toLowerCase().includes(term)) ||
           (link.description && link.description.toLowerCase().includes(term)) ||
           (link.category && link.category.toLowerCase().includes(term)) ||
           (link.url && link.url.toLowerCase().includes(term));
  });
  
  resultCount.textContent = filtered.length;
  
  if (filtered.length === 0) {
    showNoResults(term);
    return;
  }
  
  renderLinks(filtered);
}

function showWelcome() {
  resultCount.textContent = allLinks.length;
  contentArea.innerHTML = `
    <div class="state-message">
      <i class="bi bi-search"></i>
      <h3>Search Your Links</h3>
      <p>Type in the search bar above to find links by title, URL, category, or description.</p>
    </div>
  `;
}

function showNoResults(term) {
  contentArea.innerHTML = `
    <div class="state-message">
      <i class="bi bi-emoji-frown"></i>
      <h3>No Results Found</h3>
      <p>No links match "<strong>${escapeHtml(term)}</strong>". Try a different search or add a new link.</p>
    </div>
  `;
}

function renderLinks(links) {
  contentArea.innerHTML = links.map(link => {
    const domain = getDomain(link.url);
    const thumb = domain ? `https://www.google.com/s2/favicons?domain=${domain}&sz=128` : '';
    const fallback = 'https://via.placeholder.com/40/e2e8f0/64748b?text=🔗';
    
    return `
      <div class="link-card">
        <div class="link-header">
          <div class="link-title-wrapper">
            <img src="${thumb}" class="site-thumbnail" onerror="this.src='${fallback}'" alt="">
            <h3 class="link-title">${escapeHtml(link.title || 'Untitled')}</h3>
          </div>
          <div class="link-actions">
            <button class="btn-icon" data-action="edit" data-id="${link.id}" title="Edit">
              <i class="bi bi-pencil"></i>
            </button>
            <button class="btn-icon delete" data-action="delete" data-id="${link.id}" title="Delete">
              <i class="bi bi-trash"></i>
            </button>
          </div>
        </div>
        <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener" class="link-url">${escapeHtml(link.url)}</a>
        ${link.description ? `<p class="link-desc">${escapeHtml(link.description)}</p>` : ''}
        <div class="link-footer">
          ${link.category ? `<span class="badge">${escapeHtml(link.category)}</span>` : '<span></span>'}
          <a href="${escapeHtml(link.url)}" target="_blank" rel="noopener" class="btn-visit">
            Visit <i class="bi bi-arrow-up-right"></i>
          </a>
        </div>
      </div>
    `;
  }).join('');
}

// ============ CRUD OPERATIONS ============
function editLink(id) {
  const link = allLinks.find(l => l.id === id);
  if (link) openModal(link);
  else showToast('Link not found', 'error');
}

async function saveLink() {
  const title = document.getElementById('title').value.trim();
  const url = document.getElementById('url').value.trim();
  const description = document.getElementById('description').value.trim();
  const category = document.getElementById('category').value.trim();
  
  if (!title || !url) {
    showToast('Title and URL are required', 'error');
    return;
  }
  
  const action = editingId ? 'update' : 'add';
  const payload = { action, title, url, description, category };
  if (editingId) payload.id = editingId;
  
  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';
  
  // Optimistic UI update
  if (action === 'update') {
    const index = allLinks.findIndex(l => l.id === editingId);
    if (index !== -1) {
      allLinks[index] = { ...allLinks[index], title, url, description, category };
    }
  }
  
  closeModal();
  showToast(action === 'add' ? 'Adding...' : 'Saving...', 'success');
  renderContent();
  
  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload)
    });
    showToast(editingId ? 'Updated successfully!' : 'Added successfully!', 'success');
    setTimeout(fetchLinks, 1000);
  } catch (error) {
    showToast('Error saving link', 'error');
    fetchLinks();
  } finally {
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save';
  }
}

async function deleteLink(id) {
  if (!confirm('Are you sure you want to delete this link?')) return;
  
  // Optimistic UI update
  allLinks = allLinks.filter(l => l.id !== id);
  showToast('Deleting...', 'success');
  renderContent();
  
  try {
    await fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ action: 'delete', id: id })
    });
    showToast('Deleted successfully!', 'success');
  } catch (error) {
    showToast('Error deleting', 'error');
    fetchLinks();
  }
}

// ============ UTILITIES ============
function getDomain(url) {
  try { return new URL(url).hostname; }
  catch (e) { return ''; }
}

function showToast(msg, type = 'success') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = `custom-toast ${type} active`;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(() => {
    toast.classList.remove('active');
    setTimeout(() => toast.remove(), 300);
  }, 3000);
}

function debounce(fn, wait) {
  let t;
  return (...args) => {
    clearTimeout(t);
    t = setTimeout(() => fn(...args), wait);
  };
}

function escapeHtml(text) {
  if (!text) return '';
  return String(text).replace(/[&<>"']/g, m => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'
  }[m]));
}
</script>

</body>
</html>
